<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kanu Revenue</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

  <style>
    :root {
      --primary-color: #3dd9b8;
      --secondary-color: #1e3a52;
      --background-dark: #0a1929;
      --background-card: #132337;
      --border-color: #2d4a63;
      --negative-color: #ff4757;
      --positive-color: #3dd9b8;
      --table-header-color: #3dd9b8;
      --text-primary: #ffffff;
      --text-secondary: #8b9db2;
      --grid-color: #1e3a52;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
      background: var(--background-dark);
      color: var(--text-primary);
      overflow: visible !important;
    }

    h1 { margin: 0 0 6px 0; font-size: 2em; font-weight: 600; letter-spacing: -0.5px; }
    h4 { color: var(--negative-color); }

    .dashboard-container { max-width: 1400px; margin: 0 auto; }

    .filters {
      display: flex ;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
      padding: 20px;
      background: var(--background-card);
      border-radius: 8px;
      border: 1px solid var(--border-color);
      align-items: flex-end;
    }

    .filter-group { display: flex; flex-direction: column; min-width: 120px; }

    label {
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input {
      padding: 10px 14px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--background-dark);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    select:focus, input:focus { outline: none; border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(61, 217, 184, 0.1); }
    select:hover, input:hover { border-color: var(--primary-color); }

    .radio-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .radio-group label {
      margin: 0;
      padding: 8px 16px;
      background: var(--background-dark);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: none;
      font-weight: 400;
      color: var(--text-primary);
      user-select: none;
    }
    .radio-group label:hover { border-color: var(--primary-color); background: var(--secondary-color); }
    .radio-group input[type="radio"] { margin-right: 6px; }

    .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border-color), transparent); margin: 40px 0; border: none; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: var(--background-card); border-radius: 8px; overflow: hidden; }
    th, td { border: 1px solid var(--border-color); padding: 12px 16px; text-align: left; }
    th { background: var(--secondary-color); color: var(--text-primary); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
    td { color: var(--text-primary); font-size: 0.9rem; }
    tbody tr:nth-child(even) { background: rgba(30, 58, 82, 0.3); }
    tbody tr:hover { background: var(--secondary-color); transition: background-color 0.2s; }

    .charts-container { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 30px; }
    .chart-container {
      flex: 1;
      min-width: 300px;
      height: 420px;
      padding: 20px;
      background: var(--background-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
    }
    .chart-container:hover { border-color: var(--primary-color); box-shadow: 0 8px 16px rgba(61, 217, 184, 0.15); }

    .negative { color: var(--negative-color); }
    .positive { color: var(--positive-color); }

    .totals-header { font-weight: 600; margin: 20px 0 10px; font-size: 1.25rem; letter-spacing: -0.5px; }
    .table-header { font-weight: 600; margin: 20px 0 10px; font-size: 1.4rem; letter-spacing: -0.5px; }
    .table-responsive { overflow-x: auto; margin-bottom: 15px; }

    /* =================== Payslip Modal =================== */
    #payslipModal {
      display: none;
      position: fixed;
      top: 0;
      right: -100%;
      width: 50%;
      max-width: 700px;
      height: 100%;
      max-height: calc(80vh);
      background: var(--background-card);
      z-index: 1000;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
      padding: 24px;
      margin-bottom: 50px;
      transition: right 0.3s ease-in-out;
      border-left: 3px solid var(--primary-color);
      border-radius: 0;
    }
    #payslipModal.show { right: 0; }
    #payslipModal h3 { margin-bottom: 16px; font-size: 1.5rem; font-weight: 600; }
    #closePayslipBtn { float: right; font-size: 1.5em; background: none; border: none; cursor: pointer; color: var(--text-secondary); }
    #closePayslipBtn:hover { color: var(--negative-color); }

    #payslipModal label { font-weight: 500; color: var(--text-secondary); font-size: 0.875rem; }
    #payslipModal input, #payslipModal select {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 13px;
      width: 100%;
      background: var(--background-dark);
      color: var(--text-primary);
    }

    #payslipModal table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 15px; margin-bottom: 20px; }
    #payslipModal th, #payslipModal td { border: 1px solid var(--border-color); padding: 8px; }
    #payslipModal th { background: var(--secondary-color); color: var(--text-primary); font-weight: 600; }
    #payslipModal td { color: var(--text-primary); }

    #payslipSummary { font-weight: 600; margin-top: 16px; font-size: 14px; }

    #togglePayslipBtn {
      background: linear-gradient(135deg, var(--primary-color), #2ab89d);
      color: var(--background-dark);
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(61, 217, 184, 0.3);
    }
    #togglePayslipBtn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(61, 217, 184, 0.4); }

    #saveAsImageBtn {
      background: linear-gradient(135deg, #3dd9b8, #2ab89d);
      color: var(--background-dark);
      border: none;
      border-radius: 6px;
      padding: 0.6em 1.2em;
      margin-top: 1em;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    #saveAsImageBtn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(61, 217, 184, 0.4); }
    #saveAsImageBtn:disabled { background: var(--border-color); cursor: not-allowed; transform: none; box-shadow: none; }

    body, html { overflow: visible !important; }

    .disclaimer { font-size: 12px; color: var(--text-secondary); padding: 1em 0; text-align: center; }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: var(--background-dark); }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

    @media (max-width: 768px) {
      .filters { flex-direction: column; gap: 15px; align-items: stretch; }
      .charts-container { flex-direction: column; }
      .chart-container { height: auto; width: 100%; aspect-ratio: 1 / 1; }
      #payslipModal { width: 100%; max-width: none; }
      #payslipModal table { font-size: 11px; }
    }
  </style>
</head>

<body>
  <div class="dashboard-container">
    <h1>REVENUE Dashboard</h1>
    <div class="divider"></div>

    <div class="filters">
      <!-- Existing Month Filter (for table + day charts) -->
      <div class="filter-group">
        <label for="monthFilter">Time Period</label>
        <select id="monthFilter">
          <option value="ALL">ALL</option>
        </select>
      </div>

      <!-- Chart Year (bars always Jan..Dec for this year) -->
      <div class="filter-group">
        <label for="chartYear">Chart Year</label>
        <select id="chartYear"></select>
      </div>

      <div class="filter-group">
        <label for="searchInput">Search Clinics</label>
        <input type="text" id="searchInput" placeholder="Search..." />
      </div>

      <div class="filter-group">
        <label>Filter by Clinic</label>
        <div id="categoryFilters" class="radio-group">
          <label><input type="radio" name="category" value="ALL" checked> ALL</label>
        </div>
      </div>
    
        <!-- Overlay line toggle -->
      <div class="filter-group">
        <label>History Overlay</label>
        <div class="radio-group" id="overlayToggle">
          <label><input type="radio" name="overlayLine" value="ON" checked> ON</label>
          <label><input type="radio" name="overlayLine" value="OFF"> OFF</label>
        </div>
      </div>

      <div class="filter-group">
        <label for="overlayYear">History Year</label>
        <select id="overlayYear"></select>
      </div>
    
        <button id="togglePayslipBtn">Payslip</button>
      
    </div>
    
    

    <!-- Payslip Modal -->
    <div id="payslipModal">
      <button id="closePayslipBtn">✕</button>
      <h3>Kanu - Payslip & Clinic Logs</h3>
      <div style="font-size: 12px; display: flex; justify-content: center; flex-wrap: nowrap; gap: 1px;">
        <label>Select Clinic:
          <select id="payslipCategory" style="width: 150px;"></select>
        </label>
        <label>Period From:
          <input type="date" id="payslipFromDate" style="width: auto;">
        </label>
        <label>Period To:
          <input type="date" id="payslipToDate" style="width: auto;">
        </label>
        <button id="saveAsImageBtn">Save</button>
      </div>
      <p id="payslipSummary" style="display:flex; justify-content:space-around; align-items:flex-start; gap:2em; font-weight:bold; font-size:12px; margin-top:1em;"></p>
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Day</th><th>Branch</th><th>Count</th><th>Rate</th><th>Total</th>
          </tr>
        </thead>
        <tbody id="payslipTableBody"></tbody>
      </table>
    </div>

    <div class="totals" id="totalsDisplay"></div>
    <div class="divider"></div>

    <div class="charts-row">
      <div class="charts-container">
        <div class="chart-container">
          <canvas id="patientCountChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="earningsChart"></canvas>
        </div>
      </div>
    </div>

    <div class="charts-row">
      <div class="charts-container">
        <div class="chart-container">
          <canvas id="workloadByDayChart"></canvas>
        </div>
        <div class="chart-container">
          <canvas id="earningsByDayChart"></canvas>
        </div>
      </div>
    </div>

    <div class="divider"></div>
    <div class="table-header">Logbook</div>

    <table id="dataTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Clinic</th>
          <th>Branch</th>
          <th>Count</th>
          <th>Rate</th>
          <th>Earned</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    // =================== CONFIGURATION ===================
    const CONFIG = {
      csvUrl: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSmajYkga40XsAJNrKvXEFRh8TNCG_-ojL67wytOlvLJqZJdYrquS4IxikIQi84T95ftbq48sell78r/pub?gid=1192759857&single=true&output=csv",
      colors: {
        categories: { 'The Clinic': "#ff8000", 'Aqua Physio': "#00ccff" },
        items: {
          "Aperia - New": "#39e600",
          "Aperia - Repeat": "#9fff80",
          "Aqua Comm - New": "#5fe8c8",
          "Aqua Comm - Repeat": "#3dd9b8",
          "Aqua Hrly": "#00ccff",
          "Campus - New": "#ffaa00",
          "Campus - Repeat": "#ffbb33",
          "Campus Student - New": "#a29bfe",
          "Campus Student - Repeat": "#8b7fde",
          "Marina - New": "#ff704d",
          "Marina - Repeat": "#ff9980",
          "Capita Green - New": "#FF4FF6",
          "Capita Green - Repeat": "#FFB8FB"
        },
        fallback: [ "#ff00ff"
         // "#3dd9b8", "#5fe8c8", "#2ab89d", "#6fefd5", "#1fa88a",
         // "#ff6348", "#ff4757", "#ffa502", "#ff8c42", "#a29bfe",
          // "#8b7fde", "#fd79a8", "#6c5ce7", "#0984e3"
        ],
        chart: {
          positive: "#3dd9b8",
          negative: "#ff4757",
          gridLines: "rgba(45, 74, 99, 0.3)",
          text: "#8b9db2",
          textPrimary: "#ffff00"
        }
      },
      chart: {
        defaultFont: {
          family: "'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif",
          size: 11
        }
      },
      cpf: {
        kanuRate: 0.20,
        clinicRate: 0.17,
        sinda: 7
      }
    };

    // =================== STATE MANAGEMENT ===================
    const STATE = {
      rawData: [],
      filteredData: [],
      years: [],
      charts: { patientCount: null, earnings: null, workloadByDay: null, earningsByDay: null },
      colorCache: { items: {}, categories: {} }
    };

    // =================== DOM REFERENCES ===================
    const DOM = {
      monthFilter: document.getElementById('monthFilter'),
      chartYear: document.getElementById('chartYear'),
      overlayYear: document.getElementById('overlayYear'),
      overlayToggle: document.getElementById('overlayToggle'),
      searchInput: document.getElementById('searchInput'),
      categoryFilters: document.getElementById('categoryFilters'),
      dataTableBody: document.querySelector('#dataTable tbody'),
      totalsDisplay: document.getElementById('totalsDisplay'),
      payslipModal: document.getElementById('payslipModal'),
      payslipCategory: document.getElementById('payslipCategory'),
      payslipFromDate: document.getElementById('payslipFromDate'),
      payslipToDate: document.getElementById('payslipToDate'),
      payslipTableBody: document.getElementById('payslipTableBody'),
      payslipSummary: document.getElementById('payslipSummary'),
      charts: {
        patientCount: document.getElementById('patientCountChart'),
        earnings: document.getElementById('earningsChart'),
        workloadByDay: document.getElementById('workloadByDayChart'),
        earningsByDay: document.getElementById('earningsByDayChart')
      }
    };

    // =================== UTILITY FUNCTIONS ===================
    const Utils = {
      debounce(func, wait) {
        let timeout;
        return function(...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func(...args), wait);
        };
      },

      formatCurrency(value) {
        const number = parseFloat(value);
        return isNaN(number) ? 'S$ 0' : `S$ ${number.toLocaleString('en-SG', { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
      },

      // Input: YYYY-M or YYYY-MM => Output: YYYY-MM
      normalizeMonthYear(value) {
        if (!value) return '';
        const m = String(value).trim().match(/^(\d{4})[-\/](\d{1,2})$/);
        if (!m) return String(value).trim();
        const year = m[1];
        const month = String(parseInt(m[2], 10)).padStart(2, '0');
        return `${year}-${month}`;
      },

      monthYearToTs(yyyyMM) {
        const m = String(yyyyMM).match(/^(\d{4})-(\d{2})$/);
        if (!m) return -Infinity;
        const y = parseInt(m[1], 10);
        const mm = parseInt(m[2], 10);
        return new Date(y, mm - 1, 1).getTime();
      },

      // FIX: month-only axis keys ("01".."12") so overlay year can differ from bar year
      fixedMonthLabels() {
        return Array.from({ length: 12 }, (_, i) => String(i + 1).padStart(2, '0'));
      },

      monthKeyToAbbr(mm) {
        const monthNames = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
        const idx = parseInt(mm, 10) - 1;
        return monthNames[idx] || mm;
      },

      // Year-specific distinct color for overlay line
      getYearColor(year) {
        const idx = Math.abs(parseInt(year, 10) || 0) % CONFIG.colors.fallback.length;
        return CONFIG.colors.fallback[idx];
      },

      formatMonthYearLong(value) {
        if (value === 'ALL') return 'ALL TIME';
        const norm = Utils.normalizeMonthYear(value);
        const [y, m] = norm.split('-').map(n => parseInt(n, 10));
        const d = new Date(y, m - 1, 1);
        const month = d.toLocaleString('en-US', { month: 'short' }).toUpperCase();
        const year = d.getFullYear();
        return `${month} ${year}`;
      },

      getColor(key, type) {
        const cache = STATE.colorCache[type];
        const fixedColors = CONFIG.colors[type];
        if (cache[key]) return cache[key];
        if (fixedColors && fixedColors[key]) { cache[key] = fixedColors[key]; return cache[key]; }
        const idx = Object.keys(cache).length % CONFIG.colors.fallback.length;
        cache[key] = CONFIG.colors.fallback[idx];
        return cache[key];
      },

      getOverlayOn() {
        const v = document.querySelector('input[name="overlayLine"]:checked')?.value || 'ON';
        return v === 'ON';
      }
    };

    // =================== DATA PROCESSING ===================
    const DataProcessor = {
      // Creates normalized fields: _monthYear, _year, _month
      normalizeRows(rows) {
        return rows.map(row => {
          const monthField = row['Month Year'] != null ? 'Month Year' : (row['Month-Year'] != null ? 'Month-Year' : null);
          const rawMY = monthField ? row[monthField] : '';
          const normMY = Utils.normalizeMonthYear(rawMY);

          row._monthYear = normMY;

          const m = normMY.match(/^(\d{4})-(\d{2})$/);
          row._year = m ? parseInt(m[1], 10) : null;
          row._month = m ? parseInt(m[2], 10) : null;

          if (monthField) row[monthField] = normMY;
          return row;
        });
      },

      // Table/day charts filtering uses monthFilter (YYYY-MM)
      filterData() {
        const monthValue = DOM.monthFilter.value;
        const searchValue = DOM.searchInput.value.toLowerCase();
        const selectedCategory = document.querySelector('input[name="category"]:checked')?.value || 'ALL';

        return STATE.rawData.filter(row => {
          const rowMonth = row._monthYear || Utils.normalizeMonthYear(row['Month Year'] || row['Month-Year']);
          const matchesMonth = monthValue === 'ALL' || rowMonth === monthValue;

          const itemName = (row['Item Name'] || '').toLowerCase();
          const category = (row['Category'] || '').toLowerCase();
          const matchesSearch =
            !searchValue ||
            itemName.includes(searchValue) ||
            category.includes(searchValue) ||
            (searchValue.includes('camden') && category === 'aqua physio');

          const matchesCategory = selectedCategory === 'ALL' || row['Category'] === selectedCategory;
          return matchesMonth && matchesSearch && matchesCategory;
        });
      },

      // FIX: bars use month-only axis ("01".."12"), keyed by month number
      processYearForCharts(year, dataRows) {
        const y = parseInt(year, 10);
        const labels = Utils.fixedMonthLabels(); // "01".."12"

        const result = {
          labels,
          items: new Set(),
          categories: new Set(),
          itemCounts: {},          // { '01': { item: qty } }
          categoryEarnings: {},    // { '01': { category: value } }
        };

        labels.forEach(mm => {
          result.itemCounts[mm] = {};
          result.categoryEarnings[mm] = {};
        });

        dataRows.forEach(row => {
          if (row._year !== y) return;
          if (!row._month) return;

          const mm = String(row._month).padStart(2, '0');

          const item = row['Item Name'];
          const category = row['Category'];
          const value = parseFloat(row['Per patient total']) || 0;
          const quantity = parseFloat(row['Quantity']) || 0;

          result.items.add(item);
          result.categories.add(category);

          result.itemCounts[mm][item] = (result.itemCounts[mm][item] || 0) + quantity;
          result.categoryEarnings[mm][category] = (result.categoryEarnings[mm][category] || 0) + value;
        });

        return {
          labels: result.labels,
          items: Array.from(result.items).sort(),
          categories: Array.from(result.categories).sort(),
          itemCounts: result.itemCounts,
          categoryEarnings: result.categoryEarnings
        };
      },

      // FIX: overlay totals keyed by month-only axis
      overlayTotals(overlayYear, labels, mode, rows) {
        const y = parseInt(overlayYear, 10);
        const totalsMap = {};
        labels.forEach(mm => totalsMap[mm] = 0);

        rows.forEach(row => {
          if (row._year !== y) return;
          if (!row._month) return;

          const mm = String(row._month).padStart(2, '0');
          if (!totalsMap.hasOwnProperty(mm)) return;

          if (mode === 'count') {
            totalsMap[mm] += (parseFloat(row['Quantity']) || 0);
          } else {
            totalsMap[mm] += (parseFloat(row['Per patient total']) || 0);
          }
        });

        return labels.map(mm => totalsMap[mm] || 0);
      },

      // Day charts unchanged
      processDayOfWeek(data) {
        const days = ['M', 'T', 'W', 'Th', 'F'];
        const result = { workloadByDay: {}, earningsByDay: {}, items: new Set(), clinics: new Set() };

        data.forEach(row => {
          const dateStr = row['Date Convert'];
          if (!dateStr) return;
          const date = new Date(dateStr);
          if (isNaN(date.getTime())) return;

          const dayNum = date.getDay();
          if (dayNum === 0 || dayNum === 6) return;

          const dayLabel = days[dayNum - 1];
          const item = row['Item Name'];
          const clinic = row['Category'];
          const quantity = parseFloat(row['Quantity']) || 0;
          const value = parseFloat(row['Per patient total']) || 0;

          result.items.add(item);
          result.clinics.add(clinic);

          if (!result.workloadByDay[dayLabel]) result.workloadByDay[dayLabel] = {};
          if (!result.earningsByDay[dayLabel]) result.earningsByDay[dayLabel] = {};

          result.workloadByDay[dayLabel][item] = (result.workloadByDay[dayLabel][item] || 0) + quantity;
          result.earningsByDay[dayLabel][clinic] = (result.earningsByDay[dayLabel][clinic] || 0) + value;
        });

        return { days, workloadByDay: result.workloadByDay, earningsByDay: result.earningsByDay, items: Array.from(result.items), clinics: Array.from(result.clinics) };
      }
    };

    // =================== CHART RENDERING ===================
    const ChartRenderer = {
      commonOptions: { responsive: true, maintainAspectRatio: false },

      createMixedStackedConfig({ labels, barDatasets, lineDataset }, title, yAxisConfig = {}) {
        const datasets = [...barDatasets];
        if (lineDataset) datasets.push(lineDataset);

        return {
          type: 'bar',
          data: { labels, datasets },
          options: {
            ...this.commonOptions,
            plugins: {
              legend: {
                display: true,
                position: 'top',
                labels: {
                  font: { size: 11, family: CONFIG.chart.defaultFont.family, weight: '500' },
                  color: CONFIG.colors.chart.text,
                  boxWidth: 12,
                  boxHeight: 12,
                  padding: 15,
                  usePointStyle: true,
                  pointStyle: 'circle'
                }
              },

      renderPatientCount(yearData, overlayYear) {
        const barDatasets = yearData.items.map(item => ({
          label: item,
          data: yearData.labels.map(mm => Math.round(yearData.itemCounts[mm]?.[item] || 0)),
          backgroundColor: Utils.getColor(item, 'items'),
          categoryPercentage: 0.8,
          barPercentage: 0.9,
          stack: 'bars'
        }));

        const overlayOn = Utils.getOverlayOn();
        const lineDataset = (overlayOn && overlayYear && overlayYear !== 'NONE') ? {
          type: 'line',
          label: `Total (${overlayYear})`,
          data: DataProcessor.overlayTotals(overlayYear, yearData.labels, 'count', STATE.rawData),
          borderColor: Utils.getYearColor(overlayYear),
          backgroundColor: 'rgba(255,255,255,0.08)',
          pointBackgroundColor: "#ffffff",
          pointBorderColor: "#ffffff",
          pointRadius: 2,
          pointHoverRadius: 4,
          tension: 0.25,
          yAxisID: 'y'
        } : null;

        const barYear = DOM.chartYear.value;
        const title = `Workload by Clinic (Bars: ${barYear})${lineDataset ? ` | Line: ${overlayYear}` : ''}`;

        const config = this.createMixedStackedConfig(
          { labels: yearData.labels, barDatasets, lineDataset },
          title,
          { ticks: { callback: v => v.toLocaleString() } }
        );

        // Total labels for bars (pt/h logic)
        const totalLabels = yearData.labels.map(mm => {
          let patientCount = 0;
          let hours = 0;
          yearData.items.forEach(item => {
            const value = yearData.itemCounts[mm]?.[item] || 0;
            if (/^aqua/i.test(item)) hours += value;
            else patientCount += value;
          });
          let label = '';
          if (patientCount > 0) label += `${Math.round(patientCount)}pt`;
          if (hours > 0) label += `${patientCount > 0 ? ', ' : ''}${hours % 1 ? hours.toFixed(2) : Math.round(hours)}h`;
          return label;
        });

        config.plugins.push(this.createTotalLabelPlugin(totalLabels, false));
        STATE.charts.patientCount = new Chart(DOM.charts.patientCount, config);
      },

      renderEarnings(yearData, overlayYear) {
        const barDatasets = yearData.categories.map(cat => ({
          label: cat,
          data: yearData.labels.map(mm => (yearData.categoryEarnings[mm]?.[cat] || 0)),
          backgroundColor: Utils.getColor(cat, 'categories'),
          categoryPercentage: 0.8,
          barPercentage: 0.9,
          stack: 'bars'
        }));

        const overlayOn = Utils.getOverlayOn();
        const lineDataset = (overlayOn && overlayYear && overlayYear !== 'NONE') ? {
          type: 'line',
          label: `Total (${overlayYear})`,
          data: DataProcessor.overlayTotals(overlayYear, yearData.labels, 'earnings', STATE.rawData),
          borderColor: Utils.getYearColor(overlayYear),
          backgroundColor: 'rgba(255,255,255,0.08)',
          pointBackgroundColor: "#ffffff",
          pointBorderColor: "#ffffff",
          pointRadius: 2,
          pointHoverRadius: 4,
          tension: 0.25,
          yAxisID: 'y'
        } : null;

        const barYear = DOM.chartYear.value;
        const title = `Monthly Revenue (Bars: ${barYear})${lineDataset ? ` | Line: ${overlayYear}` : ''}`;

        const config = this.createMixedStackedConfig(
          { labels: yearData.labels, barDatasets, lineDataset },
          title,
          { ticks: { callback: v => Utils.formatCurrency(v) } }
        );

        // Datalabels currency formatting for bars
        config.options.plugins.datalabels.formatter = v => v.toLocaleString('en-SG', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

        // Total labels (bars year total per month)
        const totals = yearData.labels.map(mm => {
          return yearData.categories.reduce((sum, cat) => sum + (yearData.categoryEarnings[mm]?.[cat] || 0), 0);
        });

        config.plugins.push(this.createTotalLabelPlugin(totals, true));
        STATE.charts.earnings = new Chart(DOM.charts.earnings, config);

      // Day charts kept (uses monthFilter selection)
      createStackedBarConfig(data, datasets, title, yAxisConfig = {}) {
        return {
          type: 'bar',
          data: { labels: data.labels, datasets },
          options: {
            ...this.commonOptions,
            plugins: {
              legend: {
                display: datasets.length > 1,
                position: 'top',

                  font: { size: 11, family: CONFIG.chart.defaultFont.family, weight: '500' },
                  color: CONFIG.colors.chart.text,
                  boxWidth: 12,
                  boxHeight: 12,
                  padding: 15,
                  usePointStyle: true,
                  pointStyle: 'circle'
                }

                display: true,
                text: title,
                color: CONFIG.colors.chart.textPrimary,
                font: { size: 15, family: CONFIG.chart.defaultFont.family, weight: '600' },
                padding: { top: 10, bottom: 25 },
                align: 'start'
              },
              datalabels: {
                display: ctx => (ctx.dataset.data?.[ctx.dataIndex] || 0) > (yAxisConfig.minDisplay || 0),
                anchor: 'center',
                align: 'center',
                color: '#ffffff',
                font: { size: 10, weight: '600', family: CONFIG.chart.defaultFont.family },
                formatter: yAxisConfig.formatter || (value => math.round(value) )
              },
              tooltip: {
                backgroundColor: 'rgba(19, 35, 55, 0.95)',
                titleColor: CONFIG.colors.chart.textPrimary,
                bodyColor: CONFIG.colors.chart.text,
                borderColor: CONFIG.colors.chart.gridLines,
                borderWidth: 1,
                padding: 12,
                cornerRadius: 6,
                titleFont: { size: 13, weight: '600' },
                bodyFont: { size: 12 }
              }
            },
            scales: {
              x: {
                stacked: true,
                grid: { display: false, drawBorder: false },
                border: { display: false },
                ticks: {
                  font: { size: 11, family: CONFIG.chart.defaultFont.family },
                  color: CONFIG.colors.chart.text,
                  padding: 8
                }
              },
              y: {
                stacked: true,
                beginAtZero: true,
                grace: '10%',
                grid: { color: CONFIG.colors.chart.gridLines, drawBorder: false, lineWidth: 1 },
                border: { display: false },
                ticks: {
                  font: { size: 10, family: CONFIG.chart.defaultFont.family },

      renderWorkloadByDay(dayData) {
        const datasets = dayData.items.map(item => ({
          label: item,
          data: dayData.days.map(day => (dayData.workloadByDay[day]?.[item] || 0)),
          backgroundColor: Utils.getColor(item, 'items'),
          categoryPercentage: 0.8,
          barPercentage: 0.9
        }));

        const config = this.createStackedBarConfig(
          { labels: dayData.days },
          datasets,
          `Workload by Days | ${Utils.formatMonthYearLong(DOM.monthFilter.value)}`,
          { minDisplay: 2,
           formatter: (value) => Math.round(value)
          }
        );

        config.options.plugins.legend.display = false;

        const totalLabels = dayData.days.map(day => {
          let ptTotal = 0;
          let hTotal = 0;
          dayData.items.forEach(item => {
            const v = dayData.workloadByDay[day]?.[item] || 0;
            if (item.toLowerCase().startsWith('aqua')) hTotal += v;
            else ptTotal += v;
          });
          return `${Math.round(ptTotal)}pt${hTotal > 0 ? `, ${hTotal % 1 ? hTotal.toFixed(2) : Math.round(hTotal)}h` : ''}`;
        });

        config.plugins.push(this.createTotalLabelPlugin(totalLabels, false));
        STATE.charts.workloadByDay = new Chart(DOM.charts.workloadByDay, config);
      },

      renderEarningsByDay(dayData) {
        const datasets = dayData.clinics.map(clinic => ({
          label: clinic,
          data: dayData.days.map(day => (dayData.earningsByDay[day]?.[clinic] || 0)),
          backgroundColor: Utils.getColor(clinic, 'categories'),
          categoryPercentage: 0.8,
          barPercentage: 0.9
        }));

        const totals = dayData.days.map(day => dayData.clinics.reduce((sum, c) => sum + (dayData.earningsByDay[day]?.[c] || 0), 0));

        const config = this.createStackedBarConfig(
          { labels: dayData.days },
          datasets,
          `Revenue by Days | ${Utils.formatMonthYearLong(DOM.monthFilter.value)}`,
          { ticks: { callback: v => Utils.formatCurrency(v) } }
        );

        config.options.plugins.legend.display = false;
        config.options.plugins.datalabels.formatter = v => v.toLocaleString('en-SG', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

        config.plugins.push(this.createTotalLabelPlugin(totals, true));
        STATE.charts.earningsByDay = new Chart(DOM.charts.earningsByDay, config);
      },

      createTotalLabelPlugin(totals, isCurrency) {
        return {
          id: 'totalLabelPlugin',
          afterDatasetsDraw(chart) {
            const { ctx, data, scales: { x, y } } = chart;
            data.labels.forEach((label, index) => {
              const t = totals[index];
              const totalText = typeof t === 'string'
                ? t
                : (isCurrency ? 'S$' + (t || 0).toLocaleString('en-SG', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) : (t || 0));

              // Find top of stacked bars (ignore line dataset)
              let stackedSum = 0;
              chart.data.datasets.forEach(ds => {
                if (ds.type === 'line') return;
                stackedSum += (ds.data?.[index] || 0);
              });

              const xCenter = x.getPixelForValue(index);
              const yTop = y.getPixelForValue(stackedSum);

              ctx.save();
              ctx.font = `700 11px ${CONFIG.chart.defaultFont.family}`;
              ctx.fillStyle = CONFIG.colors.chart.positive;
              ctx.textAlign = 'center';
              ctx.textBaseline = 'bottom';
              ctx.fillText(totalText, xCenter, yTop - 6);
              ctx.restore();
            });
          }
        };
      },

      renderAll() {
        const barYear = DOM.chartYear.value;
        const overlayYear = DOM.overlayYear.value;

        const yearData = DataProcessor.processYearForCharts(barYear, STATE.rawData);
        const dayData = DataProcessor.processDayOfWeek(STATE.filteredData);

        this.renderPatientCount(yearData, overlayYear);
        this.renderEarnings(yearData, overlayYear);
        this.renderWorkloadByDay(dayData);
        this.renderEarningsByDay(dayData);
      },

      updateAll() {
        this.destroyAll();
        this.renderAll();
      }
    };

    // =================== UI UPDATES ===================
    const UI = {
      updateTable() {
        DOM.dataTableBody.innerHTML = '';
        if (STATE.filteredData.length === 0) {
          DOM.dataTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:2em; color: var(--text-secondary);">No data matches your filters</td></tr>';
          return;
        }

        const fragment = document.createDocumentFragment();
        STATE.filteredData.forEach((row, index) => {
          const perPatientTotal = parseFloat(row['Per patient total']) || 0;
          const categoryColor = CONFIG.colors.categories[row['Category']] || '';
          const tr = document.createElement('tr');
          tr.style.transition = 'background-color 0.2s';
          tr.onmouseenter = function() { this.style.backgroundColor = 'var(--secondary-color)'; };
          tr.onmouseleave = function() { this.style.backgroundColor = index % 2 === 0 ? 'var(--background-card)' : 'rgba(30, 58, 82, 0.3)'; };
          tr.style.backgroundColor = index % 2 === 0 ? 'var(--background-card)' : 'rgba(30, 58, 82, 0.3)';

          tr.innerHTML = `
            <td>${row['Date Convert'] || ''}</td>
            <td style="color:white; background-color:${categoryColor}; font-weight:600;">${row['Category'] || ''}</td>
            <td>${row['Item Name'] || ''}</td>
            <td>${row['Quantity'] || ''}</td>
            <td>${Utils.formatCurrency(row['price'])}</td>
            <td class="${perPatientTotal < 0 ? 'negative' : 'positive'}" style="font-weight:600;">${Utils.formatCurrency(perPatientTotal)}</td>
          `;
          fragment.appendChild(tr);
        });
        DOM.dataTableBody.appendChild(fragment);
      },

      updateTotals() {
        const itemColors = {
  "Aperia": "linear-gradient(135deg, #66cc00 0%, #ffff80 100%)",
  "Aqua": "linear-gradient(135deg, #00ffff 0%, #ffff80 100%)",
  "Campus": "linear-gradient(135deg, #ff9900 0%, #ffff80 100%)",
  "Marina": "linear-gradient(135deg, #ff6666 0%, #ffff80 100%)",
  "Capita": "linear-gradient(135deg, #FF4FF6 0%, #ffff80 100%)"
};
        const groupTotals = {};
        let grossTotal = 0;
        let aquaTotal = 0;

        STATE.filteredData.forEach(row => {
          const val = parseFloat(row["Per patient total"]) || 0;
          const item = row["Item Name"] || '';
          const firstWord = item.split(" ")[0] || '';
          groupTotals[firstWord] = (groupTotals[firstWord] || 0) + val;
          grossTotal += val;
        });

        const sortedGroups = Object.keys(groupTotals).sort();
        const displayedGroups = sortedGroups.filter(g => {
          if (g.startsWith("Aqua")) { aquaTotal += groupTotals[g]; return false; }
          return groupTotals[g] > 0;
        });

        const showAqua = aquaTotal > 0;
        const monthLabel = Utils.formatMonthYearLong(DOM.monthFilter.value);

        if (grossTotal === 0) {
          DOM.totalsDisplay.innerHTML = "<div style='text-align:center; padding:2em; color: var(--text-secondary);'>No data for selected filter.</div>";
          return;
        }

        const baseStyle = "text-align: center; vertical-align: middle; padding: 12px;";
        const cellBorder = "border: 1px solid var(--border-color);";

        DOM.totalsDisplay.innerHTML = `
          <div class="totals-header">Earning Summary</div>
          <div class="table-responsive">
            <table style="width:100%; border-collapse:collapse;">
              <tr>
                <td style="border:none; background:transparent;"></td>
                ${displayedGroups.length > 0 ? `<td colspan="${displayedGroups.length}" style="${cellBorder + baseStyle} background: linear-gradient(135deg, #ff8000, 290px, #ffff99); color: black; font-weight: 600;">The Clinic</td>` : ''}
                ${showAqua ? `<td style="${cellBorder + baseStyle} background: linear-gradient(135deg, #00ace6, 150px, #99ff99); color: var(--background-dark); font-weight: 600;">Aqua Physio</td>` : ''}
              </tr>
              <tr>
                <td style="font-weight:600; background: var(--secondary-color); ${cellBorder + baseStyle} color: var(--text-primary);">${monthLabel}</td>
                ${displayedGroups.map(clinic => `
                  <td style="${cellBorder + baseStyle} background: ${itemColors[clinic] || '#2d4a63'}; color: var(--background-dark); font-weight:600;">${clinic}</td>
                `).join('')}
                ${showAqua ? `<td style="${cellBorder + baseStyle} background: ${itemColors["Aqua"]}; color: var(--background-dark); font-weight:600;">Camden</td>` : ''}
              </tr>
              <tr>
                <td style="border-left:none; border-bottom:none; border-right:1px solid var(--border-color); ${baseStyle} background: transparent;"></td>
                ${displayedGroups.map(clinic => `<td style="${cellBorder + baseStyle} background: var(--secondary-color); color: var(--text-primary); font-weight:500;">${Utils.formatCurrency(groupTotals[clinic] || 0)}</td>`).join('')}
                ${showAqua ? `<td style="${cellBorder + baseStyle} background: var(--secondary-color); color: var(--text-primary); font-weight:500;">${Utils.formatCurrency(aquaTotal)}</td>` : ''}
              </tr>
              <tr>
                <td style="${cellBorder + baseStyle} font-weight:600; background: var(--secondary-color); color: var(--text-primary);">
                  Gross Total :
                  <span style="color: var(--positive-color); font-weight: 700; font-size: 1.1rem;">${Utils.formatCurrency(grossTotal)}</span>
                </td>
                ${displayedGroups.length > 0 ? `<td colspan="${displayedGroups.length}" style="${cellBorder + baseStyle} background: linear-gradient(135deg, #ff8000, 290px, #ffff99); color: black; font-weight: 600;">${Utils.formatCurrency(grossTotal - aquaTotal)}</td>` : ''}
                ${showAqua ? `<td style="${cellBorder + baseStyle} background: linear-gradient(135deg, #00ace6, 150px, #99ff99); color: var(--background-dark); font-weight: 600;">${Utils.formatCurrency(aquaTotal)}</td>` : ''}
              </tr>
            </table>
          </div>
        `;
      },

      populateFilters() {
        const months = new Set();
        const categories = new Set();
        const years = new Set();

        STATE.rawData.forEach(row => {
          if (row._monthYear) months.add(row._monthYear);
          if (row._year) years.add(row._year);
          if (row['Category']) categories.add(row['Category']);
        });

        // Month filter: DESC (latest first), values are YYYY-MM
        DOM.monthFilter.innerHTML = `<option value="ALL">ALL</option>`;
        Array.from(months)
          .sort((a, b) => Utils.monthYearToTs(b) - Utils.monthYearToTs(a))
          .forEach(month => {
            const option = document.createElement('option');
            option.value = month;
            option.textContent = month;
            DOM.monthFilter.appendChild(option);
          });

        // Category radios
        Array.from(categories).sort().forEach(category => {
          const label = document.createElement('label');
          label.innerHTML = `<input type="radio" name="category" value="${category}"> ${category}`;
          DOM.categoryFilters.appendChild(label);
        });

        // Years: DESC
        STATE.years = Array.from(years).sort((a, b) => b - a);

        // Chart year dropdown
        DOM.chartYear.innerHTML = '';
        STATE.years.forEach(y => {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          DOM.chartYear.appendChild(opt);
        });

        // Overlay year dropdown (include NONE)
        DOM.overlayYear.innerHTML = '';
        const none = document.createElement('option');
        none.value = 'NONE';
        none.textContent = 'NONE';
        DOM.overlayYear.appendChild(none);

        STATE.years.forEach(y => {
          const opt = document.createElement('option');
          opt.value = y;
          opt.textContent = y;
          DOM.overlayYear.appendChild(opt);
        });

        // Defaults: Bars = latest year, Overlay = previous year (if exists)
        if (STATE.years.length > 0) {
          DOM.chartYear.value = STATE.years[0];
          DOM.overlayYear.value = (STATE.years[1] != null) ? STATE.years[1] : 'NONE';
        }
      }
    };

    // =================== PAYSLIP FUNCTIONALITY ===================
    const Payslip = {
      toggle() {
        DOM.payslipModal.style.display = 'block';
        DOM.payslipModal.classList.add('show');
        this.populateCategories();
        this.render();
      },

      close() {
        DOM.payslipModal.style.display = 'none';
        DOM.payslipModal.classList.remove('show');
      },

      populateCategories() {
        const unique = [...new Set(STATE.rawData.map(r => r['Category']).filter(Boolean))];
        DOM.payslipCategory.innerHTML = `<option value="ALL">ALL</option>` + unique.map(c => `<option>${c}</option>`).join('');
      },

      render() {
        const category = DOM.payslipCategory.value;
        const fromStr = DOM.payslipFromDate.value;
        const toStr = DOM.payslipToDate.value;
        const from = fromStr ? new Date(fromStr) : null;
        const to = toStr ? new Date(toStr) : null;

        DOM.payslipTableBody.innerHTML = '';
        let total = 0;

        const data = STATE.rawData.filter(row => {
          if (!row['Receipt Date']) return false;
          const date = new Date(row['Receipt Date']);
          if (isNaN(date)) return false;
          const inCat = category === 'ALL' || row['Category'] === category;
          const inRange = (!from || date >= from) && (!to || date <= to);
          return inCat && inRange;
        });

        if (data.length === 0) {
          DOM.payslipTableBody.innerHTML = `<tr><td colspan="6" style="text-align:center; font-size:12px;">No records found</td></tr>`;
          DOM.payslipSummary.textContent = '';
          document.getElementById('saveAsImageBtn').disabled = true;
          return;
        }

        data.forEach(row => {
          const isAquaHrly = row['Item Name'] === 'Aqua Hrly';
          const qty = parseFloat(row['Quantity']) || 0;
          const qtyFormatted = isAquaHrly ? qty.toFixed(2) : parseInt(qty, 10);
          const rate = parseFloat(row['price']) || 0;
          const amount = parseFloat(row['Per patient total']) || (qty * rate);
          total += amount;

          const dateObj = new Date(row['Receipt Date']);
          const day = dateObj.toLocaleDateString('en-GB', { weekday: 'short' });
          const dateStr = dateObj.toLocaleDateString('en-GB');

          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${dateStr}</td>
            <td>${day}</td>
            <td>${row['Item Name'] || ''}</td>
            <td>${qtyFormatted}</td>
            <td>S$${Math.round(rate)}</td>
            <td${amount < 0 ? ' class="negative"' : ''}>S$${Math.round(amount)}</td>
          `;
          DOM.payslipTableBody.appendChild(tr);
        });

        this.renderSummary(total);
        document.getElementById('saveAsImageBtn').disabled = false;
      },

      renderSummary(total) {
        const totalRounded = Math.round(total);
        const kanuCPF = totalRounded * CONFIG.cpf.kanuRate;
        const clinicCPF = totalRounded * CONFIG.cpf.clinicRate;
        const totalCPF = kanuCPF + clinicCPF;
        const kanuBank = totalRounded - kanuCPF;

        const fmt = val => `S$ ${Math.round(val).toLocaleString('en-SG')}`;
        const totalClass = total < 0 ? ' class="negative"' : '';

        DOM.payslipSummary.innerHTML = `
          <div>
            <strong>Earnings</strong><br>
            Gross Pay: <span${totalClass}>${fmt(totalRounded)} est</span><br>
            Nett Pay: ${fmt(kanuBank)} est
          </div>
          <div>
            <strong>CPF Deductions</strong><br>
            Kanu CPF: ${fmt(kanuCPF)} est<br>
            Extra CPF: ${fmt(clinicCPF)} est<br>
          </div>
          <div>
            <strong>Other & CPF Total</strong><br>
            SINDA: ${fmt(CONFIG.cpf.sinda)} est<br>
            Total CPF: ${fmt(totalCPF)} est
          </div>
        `;
      },

      async saveAsImage() {
        const modal = DOM.payslipModal;
        if (!modal) { alert('Error: Modal not found.'); return; }

        const clone = modal.cloneNode(true);
        clone.style.cssText = `
          position:absolute; left:-9999px; display:block;
          width:${modal.offsetWidth}px; height:auto; max-height:none;
          overflow:visible; padding-bottom:20px; font-family:Arial, sans-serif;
          padding:1em; background:white; border:1px solid #ccc;
          box-shadow:0 0 10px rgba(0,0,0,0.2);
        `;

        clone.querySelector('#saveAsImageBtn')?.remove();
        clone.querySelector('#closePayslipBtn')?.remove();

        const originalSelect = DOM.payslipCategory;
        const clonedSelect = clone.querySelector('#payslipCategory');
        if (clonedSelect && originalSelect) clonedSelect.value = originalSelect.value;

        const disclaimer = document.createElement('p');
        disclaimer.className = 'disclaimer';
        disclaimer.textContent = 'Disclaimer: Generated for time log comparison purposes only. Rate & Total E&OE.';
        clone.appendChild(disclaimer);

        document.body.appendChild(clone);

        setTimeout(() => {
          html2canvas(clone, {
            scale: 2,
            backgroundColor: '#ffffff',
            useCORS: true,
            logging: false,
            scrollX: 0,
            scrollY: 0,
            width: clone.scrollWidth,
            height: clone.scrollHeight
          }).then(canvas => {
            document.body.removeChild(clone);
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = this.generateFilename();
            link.click();
          }).catch(err => {
            document.body.removeChild(clone);
            console.error('Error generating image:', err);
            alert('Failed to save the modal as an image. Please try again.');
          });
        }, 300);
      },

      generateFilename() {
        const category = DOM.payslipCategory.value;
        const fromStr = DOM.payslipFromDate.value;
        const toStr = DOM.payslipToDate.value;

        const fromDate = fromStr ? new Date(fromStr) : null;
        const toDate = toStr ? new Date(toStr) : null;

        let fallbackFromDate = null;
        if (!fromDate && STATE.rawData.length > 0) {
          const validDates = STATE.rawData.map(r => new Date(r['Receipt Date'])).filter(d => !isNaN(d));
          fallbackFromDate = validDates.length > 0 ? new Date(Math.min(...validDates)) : null;
        }

        const formatMMMYY = date => date ? date.toLocaleDateString('en-SG', { month: 'short', year: '2-digit' }) : '';

        let filename = 'Kanu Time Log';
        if (category && category !== 'ALL') filename += ` - ${category}`;

        const from = fromDate || fallbackFromDate;
        const to = toDate || new Date();
        if (from && to) filename += ` - ${formatMMMYY(from)} to ${formatMMMYY(to)}`;

        return filename.replace(/\s+/g, '') + '.png';
      }
    };

    // =================== MAIN APPLY / INIT ===================
    function applyFilters() {
      STATE.filteredData = DataProcessor.filterData();
      UI.updateTable();
      UI.updateTotals();
      ChartRenderer.updateAll();
    }

    function setupEventListeners() {
      DOM.monthFilter.addEventListener('change', Utils.debounce(applyFilters, 200));
      DOM.searchInput.addEventListener('input', Utils.debounce(applyFilters, 200));
      DOM.categoryFilters.addEventListener('change', applyFilters);

      DOM.chartYear.addEventListener('change', () => ChartRenderer.updateAll());
      DOM.overlayYear.addEventListener('change', () => ChartRenderer.updateAll());
      DOM.overlayToggle.addEventListener('change', () => ChartRenderer.updateAll());

      document.getElementById('togglePayslipBtn').addEventListener('click', () => Payslip.toggle());
      document.getElementById('closePayslipBtn').addEventListener('click', () => Payslip.close());
      document.getElementById('saveAsImageBtn').addEventListener('click', () => Payslip.saveAsImage());

      ['payslipCategory', 'payslipFromDate', 'payslipToDate'].forEach(id => {
        document.getElementById(id).addEventListener('change', () => Payslip.render());
      });

      window.addEventListener('resize', Utils.debounce(() => {
        const isMobile = window.innerWidth <= 768;
        document.querySelectorAll('.chart-container').forEach(c => c.style.height = isMobile ? 'auto' : '420px');
        ChartRenderer.updateAll();
      }, 250));
    }

    async function fetchData() {
      try {
        const response = await fetch(CONFIG.csvUrl);
        if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
        const csvText = await response.text();

        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            // Normalize month format to YYYY-MM (fix sorting + filter)
            STATE.rawData = DataProcessor.normalizeRows(results.data);

            UI.populateFilters();

            // Default monthFilter to ALL (table/day charts)
            DOM.monthFilter.value = 'ALL';

            applyFilters();
            ChartRenderer.renderAll();
          },
          error: function(err) {
            console.error('Error parsing CSV:', err);
            alert('Failed to load data. Please try again.');
          }
        });
      } catch (error) {
        console.error('Error fetching data:', error);
        alert('Failed to load data. Please check your connection and try again.');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      setupEventListeners();
      fetchData();
    });
  </script>
</body>
</html>
